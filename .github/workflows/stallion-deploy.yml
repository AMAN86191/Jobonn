name: Stallion OTA Deploy

on:
  push:
    branches:
      - main  # Change to master if your main branch name is master

jobs:
  deploy:
    name: Publish Android Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish OTA Update to Stallion
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          npx --yes stallion publish-bundle \
            --upload-path=aman-biban/jobonn/production \
            --platform=android \
            --release-note="$COMMIT_MSG" \
            --ci-token="${{ secrets.STALLION_CI_TOKEN }}"
